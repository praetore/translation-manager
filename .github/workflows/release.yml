name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build (e.g. v0.4.0). Leave empty to use package.json version.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate packaging: Vitest + Playwright Electron must pass before we create
  # a GitHub release or upload installers.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit + component tests
        run: npm test

      - name: Install OS dependencies for Electron e2e
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libgbm1 \
            libx11-xcb1 \
            libxshmfence1 \
            libdrm2 \
            libasound2t64 || sudo apt-get install -y libasound2

      - name: Build renderer + Electron
        run: npm run build

      - name: Electron e2e (Playwright)
        run: xvfb-run -a npm run test:e2e

  # Create the GitHub release once up front so parallel platform/arch
  # publishers only upload assets (avoids 422 tag_name already_exists).
  prepare:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v$(node -p "require('./package.json').version")"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Using tag ${TAG}"

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists — publishers will upload assets to it."
            exit 0
          fi
          # Ignore races if another run created the release between view and create.
          if gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release ${TAG}" \
            --target "$GITHUB_SHA"; then
            echo "Created release ${TAG}"
          elif gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} appeared concurrently — continuing."
          else
            echo "Failed to create or find release ${TAG}" >&2
            exit 1
          fi

  release:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + Electron
        run: npm run build

      # Build only — do not let electron-builder create/upload the GitHub release.
      # Parallel matrix jobs (and Windows nsis+portable) race on POST /releases and
      # fail with 422 tag_name already_exists; prepare owns release creation.
      - name: Package (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never

      - name: Package (macOS)
        if: matrix.platform == 'mac'
        env:
          # Unsigned CI builds (no Apple Developer cert in this workflow)
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --publish never

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never

      - name: Upload artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.zip
            release/*.blockmap
            release/latest*.yml
          )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found under release/" >&2
            ls -la release/ >&2 || true
            exit 1
          fi
          echo "Uploading ${#files[@]} file(s) to ${TAG}:"
          printf '  %s\n' "${files[@]}"
          gh release upload "$TAG" "${files[@]}" --clobber

  # After a successful release: refresh README screenshots from that build,
  # bump package.json to the next minor, and commit both to master.
  post-release:
    needs: [prepare, release]
    runs-on: ubuntu-latest
    if: ${{ success() }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install OS dependencies for Electron screenshots
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libgbm1 \
            libx11-xcb1 \
            libxshmfence1 \
            libdrm2 \
            libasound2t64 || sudo apt-get install -y libasound2

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + Electron
        run: npm run build

      - name: Capture README screenshots
        run: xvfb-run -a npm run screenshots

      - name: Stage screenshot + version bump artifacts
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.tag }}"
          CURRENT="$(node -p "require('./package.json').version")"
          mkdir -p /tmp/post-release
          cp docs/main-window-dark.png docs/main-window-light.png /tmp/post-release/

          if [ "v${CURRENT}" != "${TAG}" ]; then
            echo "package.json is ${CURRENT} but release tag is ${TAG} — skipping version bump"
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          npm version minor --no-git-tag-version
          NEXT="$(node -p "require('./package.json').version")"
          cp package.json package-lock.json /tmp/post-release/
          echo "should_bump=true" >> "$GITHUB_OUTPUT"
          echo "next_version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Bumped ${CURRENT} → ${NEXT}"

      - name: Checkout master
        uses: actions/checkout@v5
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit screenshots and version bump to master
        env:
          SHOULD_BUMP: ${{ steps.bump.outputs.should_bump }}
          NEXT_VERSION: ${{ steps.bump.outputs.next_version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs
          cp /tmp/post-release/main-window-dark.png /tmp/post-release/main-window-light.png docs/

          if [ "${SHOULD_BUMP}" = "true" ]; then
            cp /tmp/post-release/package.json /tmp/post-release/package-lock.json .
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/main-window-dark.png docs/main-window-light.png
          if [ "${SHOULD_BUMP}" = "true" ]; then
            git add package.json package-lock.json
          fi

          if git diff --staged --quiet; then
            echo "No post-release changes to commit"
            exit 0
          fi

          if [ "${SHOULD_BUMP}" = "true" ]; then
            git commit -m "chore: bump to ${NEXT_VERSION} and refresh README screenshots"
          else
            git commit -m "chore: refresh README screenshots after ${{ needs.prepare.outputs.tag }}"
          fi
          git push origin HEAD:master
